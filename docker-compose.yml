services:
  postgres:
    image: postgres:16-alpine
    container_name: job_api_postgres
    environment:
      POSTGRES_USER: jobapi
      POSTGRES_PASSWORD: jobapi_pass
      POSTGRES_DB: job_applications
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobapi -d job_applications"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: job_api_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
